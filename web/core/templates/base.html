<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Catálogo IB{% endblock %}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/1.1.0/modern-normalize.min.css" integrity="sha512-+T0RPuaQ6gd4uZt0Hk0GJzNPB1RktIPocvd/rJADc3KMWwC6P0D5sR0TG5Xx4Z1T9kK7ZlTimmHcsCjw8xm8Zw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    body { font-family: Inter, system-ui, sans-serif; background: #f3f4f6; margin: 0; padding: 0; }
    .layout { max-width: 960px; margin: 0 auto; padding: 28px; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 8px 24px rgba(15,23,42,.08); padding: 24px; }
    table { width: 100%; border-collapse: collapse; margin: 24px 0 0; }
    th, td { padding: 14px 16px; border-bottom: 1px solid #e5e7eb; }
    th { background: #eef2ff; text-align: left; }
    .label { display: inline-flex; gap: 8px; align-items: center; margin-bottom: 16px; font-weight: 700; color: #1f2937; }
    .error { color: #b91c1c; background: #fee2e2; padding: 16px; margin-bottom: 16px; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
