services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mundialdb
    volumes:
      - ./api/db:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    ports:
      - '3307:3306'
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DB_HOST: db
      DB_PORT: '3306'
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: mundialdb
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      API_BASE_URL: http://api:3000
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
